apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nebius-cpu-nodepool
spec:
  template:
    metadata:
      labels:
        nodepool: nebius-cpu-nodepool
    spec:
      nodeClassRef:
        group: flex.aks.azure.com
        kind: NebiusNodeClass
        name: nebius
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - cpu-d3-32vcpu-128gb
  limits:
    cpu: "1000"
    memory: 1000Gi