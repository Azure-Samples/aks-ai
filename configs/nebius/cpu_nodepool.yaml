apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nebius-cpu-nodepool
spec:
  template:
    metadata:
      labels:
        nodepool: nebius-cpu-nodepool
    spec:
      nodeClassRef:
        group: flex.aks.azure.com
        kind: NebiusNodeClass
        name: nebius
      taints:
        - key: nebius.com/workload-only
          effect: NoSchedule
      requirements:
        - key: karpenter.azure.com/sku-cpu
          operator: Gt
          values: ["8"]
        - key: karpenter.azure.com/sku-gpu-count
          operator: In
          values: ["0"]
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: Never
  limits:
    cpu: "1000"
    memory: 1000Gi