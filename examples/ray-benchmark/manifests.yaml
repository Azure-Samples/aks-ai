---
# Service: exposes head pod for DNS-based discovery by workers
apiVersion: v1
kind: Service
metadata:
  name: ray-head-svc
  labels:
    app: ray-benchmark-head
spec:
  selector:
    app: ray-benchmark-head
  ports:
    - name: http
      port: 8265
      targetPort: 8265
      protocol: TCP
    - name: iperf
      port: 5201
      targetPort: 5201
      protocol: TCP
---
# Head Deployment: runs on CPU node pool (mimics Ray head)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-benchmark-head
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ray-benchmark-head
  template:
    metadata:
      labels:
        app: ray-benchmark-head
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: unbounded.aks.azure.com/site
                    operator: In
                    values:
                      - nebius
      containers:
        - name: head
          image: python:3.12-slim
          command: ["sh", "-c", "apt-get update && apt-get install -y iperf3 && python /scripts/head_server.py"]
          env:
            - name: HEAD_PORT
              value: "8265"
            - name: IPERF_PORT
              value: "5201"
          ports:
            - containerPort: 8265
            - containerPort: 5201
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "16"
              memory: "32Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8265
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: ray-benchmark-scripts
---
# Worker Job: runs on GPU node pool (mimics Ray workers), run-to-completion
apiVersion: batch/v1
kind: Job
metadata:
  name: ray-benchmark-worker
spec:
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: ray-benchmark-worker
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: unbounded.aks.azure.com/site
                    operator: In
                    values:
                      - nebius
      containers:
        - name: worker
          image: python:3.12-slim
          command: ["sh", "-c", "apt-get update && apt-get install -y iperf3 && python /scripts/worker_client.py"]
          env:
            - name: HEAD_SERVICE
              value: "ray-head-svc"
            - name: HEAD_PORT
              value: "8265"
            - name: IPERF_PORT
              value: "5201"
            - name: IPERF_DURATION
              value: "30"
            - name: IPERF_PARALLEL
              value: "32"
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: ray-benchmark-scripts
