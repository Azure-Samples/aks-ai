apiVersion: batch/v1
kind: Job
metadata:
  name: inference-benchmark
  namespace: default
spec:
  ttlSecondsAfterFinished: 86400   # keep pod for 24h after completion
  backoffLimit: 0
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - gpu-h100-sxm-8gpu-128vcpu-1600gb
      restartPolicy: Never
      containers:
        - name: benchmark
          image: vllm/vllm-openai:latest
          command: ["python3", "/scripts/benchmark.py"]
          args:
            - "--model=Qwen/Qwen2.5-7B-Instruct"
            - "--num-prompts=50"
            - "--max-tokens=256"
            - "--tensor-parallel-size=1"
          resources:
            limits:
              cpu: "16"
              memory: "32Gi"
              nvidia.com/gpu: "1"
            requests:
              cpu: "16"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: scripts
          configMap:
            name: inference-benchmark-script
        - name: hf-cache
          emptyDir: {}
