apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: distributed-training
  namespace: ray
spec:
  entrypoint: python /home/ray/scripts/distributed_training.py
  runtimeEnvYAML: |
    pip:
      - ipywidgets==8.1.3
      - matplotlib==3.10.0
      - mlflow==2.19.0
      - torch==2.7.1
      - transformers==4.52.3
      - scikit-learn==1.6.0
      - "doggos @ git+https://github.com/anyscale/multimodal-ai.git#subdirectory=doggos"
    env_vars:
      RAY_TRAIN_V2_ENABLED: "1"
      RAY_TRAIN_WORKER_GROUP_START_TIMEOUT_S: "120"

  shutdownAfterJobFinishes: false   # keep cluster alive to inspect results

  submitterPodTemplate:
    spec:
      restartPolicy: Never
      containers:
        - name: ray-job-submitter
          image: rayproject/ray:2.48.0-py312
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: agentpool
                    operator: In
                    values:
                      - cpu

  rayClusterSpec:
    rayVersion: "2.48.0"
    enableInTreeAutoscaling: false

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        dashboard-host: "0.0.0.0"
        disable-usage-stats: "true"
      template:
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: agentpool
                        operator: In
                        values:
                          - cpu
          containers:
            - name: ray-head
              image: rayproject/ray:2.48.0-py312
              env:
                - name: RAY_DISABLE_DOCKER_CPU_WARNING
                  value: "1"
                - name: RAY_SCHEDULER_EVENTS
                  value: "0"
                - name: RAY_TRAIN_V2_ENABLED
                  value: "1"
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
              resources:
                limits:
                  cpu: "14"
                  memory: "60Gi"
                requests:
                  cpu: "14"
                  memory: "60Gi"
              volumeMounts:
                - name: scripts
                  mountPath: /home/ray/scripts
          volumes:
            - name: scripts
              configMap:
                name: distributed-training-scripts
                items:
                  - key: distributed_training.py
                    path: distributed_training.py

    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: 2
        minReplicas: 2
        maxReplicas: 2
        rayStartParams:
          num-gpus: "8"
          num-cpus: "64"
        template:
          spec:
            tolerations:
              - key: sku
                operator: Equal
                value: gpu
                effect: NoSchedule
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: agentpool
                          operator: In
                          values:
                            - gpu
            resourceClaims:
              - name: gpus
                resourceClaimTemplateName: gpus
            containers:
              - name: ray-worker
                image: rayproject/ray:2.48.0-py312-gpu
                env:
                  - name: RAY_TRAIN_V2_ENABLED
                    value: "1"
                resources:
                  claims:
                    - name: gpus
                  limits:
                    cpu: "64"
                    memory: "64Gi"
                  requests:
                    cpu: "64"
                    memory: "64Gi"
                volumeMounts:
                  - name: scripts
                    mountPath: /home/ray/scripts
            volumes:
              - name: scripts
                configMap:
                  name: distributed-training-scripts
                  items:
                    - key: distributed_training.py
                      path: distributed_training.py
---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: gpus
  namespace: ray
spec:
  spec:
    devices:
      requests:
        - name: gpus
          exactly:
            deviceClassName: gpu.nvidia.com
            count: 8
            allocationMode: ExactCount
