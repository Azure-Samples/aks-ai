# Nebius-specific patches: nodepool and instance-type affinity
- op: add
  path: /spec/submitterPodTemplate/spec/affinity
  value:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nodepool
                operator: In
                values:
                  - nebius-cpu-nodepool
- op: add
  path: /spec/rayClusterSpec/headGroupSpec/template/spec/affinity
  value:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nodepool
                operator: In
                values:
                  - nebius-cpu-nodepool
- op: add
  path: /spec/rayClusterSpec/workerGroupSpecs/0/template/spec/affinity
  value:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - gpu-h100-sxm-8gpu-128vcpu-1600gb
