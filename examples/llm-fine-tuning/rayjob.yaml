apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: distributed-finetuning
  namespace: ray
spec:
  entrypoint: python /home/ray/scripts/fine_tune.py
  runtimeEnvYAML: |
    pip:
      - xgrammar==0.1.11
      - pynvml==12.0.0
      - hf_transfer==0.1.9
      - tensorboard==2.19.0
      - "llamafactory@git+https://github.com/hiyouga/LLaMA-Factory.git@ac8c6fdd3ab7fb6372f231f238e6b8ba6a17eb16#egg=llamafactory"
      - IPython
    env_vars:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      RAY_TRAIN_V2_ENABLED: "0"

  shutdownAfterJobFinishes: false   # keep cluster alive to inspect results

  rayClusterSpec:
    rayVersion: "2.53.0"
    enableInTreeAutoscaling: false

    headGroupSpec:
      rayStartParams:
        num-cpus: "0" # don't schedule training workers on head
        dashboard-host: "0.0.0.0"
        disable-usage-stats: "true"
      template:
        spec:
          tolerations:
            - key: nebius.com/workload-only
              operator: Exists
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nodepool
                        operator: In
                        values:
                          - nebius-cpu-nodepool
          containers:
            - name: ray-head
              image: rayproject/ray:2.53.0
              env:
                - name: RAY_DISABLE_DOCKER_CPU_WARNING
                  value: "1"
                - name: RAY_SCHEDULER_EVENTS
                  value: "0"
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
              resources:
                limits:
                  cpu: "8"
                  memory: "32Gi"
                requests:
                  cpu: "8"
                  memory: "32Gi"
              volumeMounts:
                - name: scripts
                  mountPath: /home/ray/scripts
          volumes:
            - name: scripts
              configMap:
                name: fine-tune-scripts
                items:
                  - key: fine_tune.py
                    path: fine_tune.py

    workerGroupSpecs:
      - groupName: workers
        replicas: 2
        minReplicas: 2
        maxReplicas: 4
        rayStartParams:
          num-gpus: "4"
          num-cpus: "64"
        template:
          spec:
            tolerations:
              - key: nebius.com/workload-only
                operator: Exists
                effect: NoSchedule
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: node.kubernetes.io/instance-type
                          operator: In
                          values:
                            - gpu-h100-sxm-8gpu-128vcpu-1600gb
            containers:
              - name: ray-worker
                image: rayproject/ray:2.53.0-gpu
                resources:
                  limits:
                    cpu: "64"
                    memory: "64Gi"
                    nvidia.com/gpu: "4"
                  requests:
                    cpu: "64"
                    memory: "64Gi"
                    nvidia.com/gpu: "4"
