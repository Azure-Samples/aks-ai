apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: llm-inferencing
  namespace: ray
spec:
  entrypoint: python /home/ray/scripts/main.py
  runtimeEnvYAML: |
    env_vars:
      MODEL: "Qwen/Qwen2.5-7B-Instruct"
      NUM_PROMPTS: "50"
      MAX_TOKENS: "256"
      TENSOR_PARALLEL_SIZE: "1"
      CONCURRENCY: "2"

  shutdownAfterJobFinishes: false # keep cluster alive to inspect results

  submitterPodTemplate:
    spec:
      restartPolicy: Never
      containers:
        - name: ray-job-submitter
          image: ghcr.io/azure-samples/aks-ai/llm-inferencing:latest

  rayClusterSpec:
    rayVersion: "2.53.0"
    enableInTreeAutoscaling: false

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        dashboard-host: "0.0.0.0"
        disable-usage-stats: "true"
      template:
        spec:
          containers:
            - name: ray-head
              image: ghcr.io/azure-samples/aks-ai/llm-inferencing:latest
              env:
                - name: RAY_DISABLE_DOCKER_CPU_WARNING
                  value: "1"
                - name: RAY_SCHEDULER_EVENTS
                  value: "0"
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                requests:
                  cpu: "4"
                  memory: "16Gi"
              volumeMounts:
                - name: scripts
                  mountPath: /home/ray/scripts
          volumes:
            - name: scripts
              configMap:
                name: llm-inferencing-scripts
                items:
                  - key: main.py
                    path: main.py

    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: 2
        minReplicas: 2
        maxReplicas: 2
        rayStartParams:
          num-gpus: "1"
          num-cpus: "8"
        template:
          spec:
            containers:
              - name: ray-worker
                image: ghcr.io/azure-samples/aks-ai/llm-inferencing:latest
                resources:
                  limits:
                    cpu: "8"
                    memory: "16Gi"
                  requests:
                    cpu: "8"
                    memory: "16Gi"
                  claims:
                    - name: gpus
                volumeMounts:
                  - name: scripts
                    mountPath: /home/ray/scripts
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
            volumes:
              - name: scripts
                configMap:
                  name: llm-inferencing-scripts
                  items:
                    - key: main.py
                      path: main.py
              - name: hf-cache
                emptyDir: {}
            resourceClaims:
              - name: gpus
                resourceClaimTemplateName: single-gpu
