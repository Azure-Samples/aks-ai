# Azure-specific patches: nodeSelector for CPU and GPU node pools
- op: add
  path: /spec/submitterPodTemplate/spec/nodeSelector
  value:
    agentpool: cpu
- op: add
  path: /spec/rayClusterSpec/headGroupSpec/template/spec/nodeSelector
  value:
    agentpool: cpu
- op: add
  path: /spec/rayClusterSpec/workerGroupSpecs/0/template/spec/tolerations
  value:
    - key: sku
      operator: Equal
      value: gpu
      effect: NoSchedule
- op: add
  path: /spec/rayClusterSpec/workerGroupSpecs/0/template/spec/nodeSelector
  value:
    agentpool: gpu
