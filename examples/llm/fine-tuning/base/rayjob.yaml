apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: llm-fine-tuning
  namespace: ray
spec:
  entrypoint: python /home/ray/scripts/main.py
  runtimeEnvYAML: |
    pip:
      - xgrammar==0.1.11
      - pynvml==12.0.0
      - hf_transfer==0.1.9
      - tensorboard==2.19.0
      - "llamafactory@git+https://github.com/hiyouga/LLaMA-Factory.git@ac8c6fdd3ab7fb6372f231f238e6b8ba6a17eb16#egg=llamafactory"
      - IPython
    env_vars:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      RAY_TRAIN_V2_ENABLED: "0"

  shutdownAfterJobFinishes: false   # keep cluster alive to inspect results

  submitterPodTemplate:
    spec:
      restartPolicy: Never
      containers:
        - name: ray-job-submitter
          image: rayproject/ray:2.53.0

  rayClusterSpec:
    rayVersion: "2.53.0"
    enableInTreeAutoscaling: false

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        dashboard-host: "0.0.0.0"
        disable-usage-stats: "true"
      template:
        spec:
          containers:
            - name: ray-head
              image: rayproject/ray:2.53.0
              env:
                - name: RAY_DISABLE_DOCKER_CPU_WARNING
                  value: "1"
                - name: RAY_SCHEDULER_EVENTS
                  value: "0"
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
              resources:
                limits:
                  cpu: "8"
                  memory: "32Gi"
                requests:
                  cpu: "8"
                  memory: "32Gi"
              volumeMounts:
                - name: scripts
                  mountPath: /home/ray/scripts
          volumes:
            - name: scripts
              configMap:
                name: llm-fine-tuning-scripts
                items:
                  - key: main.py
                    path: main.py

    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: 2
        minReplicas: 2
        maxReplicas: 4
        rayStartParams:
          num-gpus: "8"
          num-cpus: "64"
        template:
          spec:
            containers:
              - name: ray-worker
                image: rayproject/ray:2.53.0-gpu
                resources:
                  limits:
                    cpu: "64"
                    memory: "64Gi"
                  requests:
                    cpu: "64"
                    memory: "64Gi"
                  claims:
                    - name: gpus
                volumeMounts:
                  - name: scripts
                    mountPath: /home/ray/scripts
            volumes:
              - name: scripts
                configMap:
                  name: llm-fine-tuning-scripts
                  items:
                    - key: main.py
                      path: main.py
            resourceClaims:
              - name: gpus
                resourceClaimTemplateName: multi-gpu
