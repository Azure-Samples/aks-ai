apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: azure-cpu-nodepool
spec:
  template:
    metadata:
      labels:
        nodepool: azure-cpu-nodepool
    spec:
      nodeClassRef:
        group: karpenter.azure.com
        kind: AKSNodeClass
        name: azure
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
  limits:
    cpu: "100"
    memory: 400Gi
